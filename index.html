<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Laboratorio interactivo de gramática inglesa para nivel B2.">
    <meta name="theme-color" content="#0b7a68">
    <title>Laboratorio Inglés · Gramática B2</title>
    <link rel="stylesheet" href="styles.css">
    <script src="exercises.js" defer></script>
    <script src="app.js" defer></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <button class="brand" type="button" data-action="lesson" aria-label="Ir a la lección">
          <span class="brand-mark" aria-hidden="true">LI</span>
          <span><strong>Laboratorio Inglés</strong><small>Gramática B2</small></span>
        </button>
        <button class="menu-button" type="button" data-action="menu" aria-expanded="false" aria-controls="main-nav">
          <span></span><span></span><span></span><span class="sr-only">Abrir menú</span>
        </button>
        <nav class="nav" id="main-nav" aria-label="Navegación principal">
          <button type="button" data-action="lesson">Lección completa</button>
          <button type="button" data-action="practice">Práctica mixta</button>
          <button type="button" data-action="mistakes">Mis errores <span class="nav-count">0</span></button>
        </nav>
      </header>

      <main id="app" tabindex="-1"></main>

      <footer>
        <p>Laboratorio Inglés · Future forms &amp; determiners</p>
        <button type="button" data-action="reset">Reiniciar progreso</button>
      </footer>
    </div>
    <noscript>Necesitas activar JavaScript para usar los ejercicios interactivos.</noscript>
  </body>
</html>
